services:
  teleagent2api:
    build: .
    container_name: teleagent2api
    restart: unless-stopped
    ports:
      - "10000:10000"
    environment:
      - TELEAGENT_TOKEN=${TELEAGENT_TOKEN:-}
      - TELEAGENT_INSTALL_ID=${TELEAGENT_INSTALL_ID:-}
      - TELEAGENT_DEVICE_ID=${TELEAGENT_DEVICE_ID:-}
      - API_KEY=${API_KEY:?API_KEY is required}
      - TELEAGENT_TIMEOUT=${TELEAGENT_TIMEOUT:-20m}
      - TELEAGENT_CHUNK_TIMEOUT=${TELEAGENT_CHUNK_TIMEOUT:-15m}
      - TELEAGENT_LOG_LEVEL=${TELEAGENT_LOG_LEVEL:-info}
      - TELEAGENT_LOG_FORMAT=${TELEAGENT_LOG_FORMAT:-text}
      - TELEAGENT_RETRY_COUNT=${TELEAGENT_RETRY_COUNT:-0}
      - TELEAGENT_EMPTY_RETRY_COUNT=${TELEAGENT_EMPTY_RETRY_COUNT:-2}
      - TELEAGENT_EXPOSE_REASONING=${TELEAGENT_EXPOSE_REASONING:-false}
      - TELEAGENT_REASONING_TO_CONTENT=${TELEAGENT_REASONING_TO_CONTENT:-false}
      - TELEAGENT_MIN_OUTPUT_TOKENS=${TELEAGENT_MIN_OUTPUT_TOKENS:-1024}
    volumes:
      # Optional: Mount config.json if you prefer file-based config over env vars
      # - ./config.json:/app/config.json:ro
    networks:
      - teleagent_net

networks:
  teleagent_net:
    driver: bridge
